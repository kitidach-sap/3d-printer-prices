<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compare 3D Printers - 3D Printer Prices</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .compare-container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1rem;
      overflow-x: auto;
    }
    .compare-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-card);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .compare-table th, .compare-table td {
      border: 1px solid var(--border);
      padding: 1rem;
      text-align: center;
      vertical-align: top;
      width: 33.33%;
    }
    .compare-table th {
      background: var(--bg-hover);
      font-weight: 600;
    }
    .compare-header-img {
      width: 120px;
      height: 120px;
      object-fit: contain;
      margin-bottom: 1rem;
      background: #fff;
      border-radius: 8px;
    }
    .spec-row {
      text-align: left !important;
    }
    .spec-label {
      font-weight: 600;
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: 0.25rem;
      display: block;
      text-align: left;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <div class="logo">
        <span class="logo-icon">⚖️</span>
        <div>
          <h1>Compare Printers</h1>
          <p class="tagline">Side-by-side specs comparison</p>
        </div>
      </div>
      <div class="header-actions">
        <a href="/" class="btn-icon">🏠 Home</a>
      </div>
    </div>
  </header>

  <main class="compare-container">
    <div id="compare-loader" style="text-align:center; padding: 4rem;">
      <div class="loader" style="margin:0 auto;"></div>
      <p style="margin-top:1rem; color:var(--text-muted);">Loading comparison data...</p>
    </div>
    
    <div id="compare-results"></div>
  </main>

  <script src="compare.js"></script>
</body>
</html>
