<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare 3D Printers - 3D Printer Prices</title>
    <meta name="description" content="Side-by-side comparison of 3D printers based on price, materials, strengths, and weaknesses.">
    <link rel="stylesheet" href="style.css">
    <style>
        .compare-page-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
            overflow-x: auto;
        }
        
        .compare-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        
        .compare-table th, .compare-table td {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            border-right: 1px solid var(--border);
            vertical-align: top;
            min-width: 280px;
        }
        
        .compare-table th:last-child, .compare-table td:last-child {
            border-right: none;
        }
        
        .compare-table th {
            text-align: left;
            background: var(--bg-primary);
            font-weight: 600;
            color: var(--text-secondary);
            width: 180px; /* Fixed width for feature names */
            min-width: 180px;
        }
        
        /* The top row with images */
        .compare-header-row td {
            text-align: center;
            background: var(--bg-card);
        }
        
        .compare-img {
            max-width: 200px;
            height: 180px;
            object-fit: contain;
            margin-bottom: 1rem;
        }
        
        .compare-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }
        
        .compare-price {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--success);
            margin-bottom: 1rem;
        }
        
        .compare-remove {
            color: var(--danger);
            background: transparent;
            border: 1px solid var(--danger);
            border-radius: var(--radius-sm);
            padding: 0.35rem 0.75rem;
            font-size: 0.85rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.2s;
        }
        .compare-remove:hover {
            background: rgba(239, 68, 68, 0.1);
        }
        
        .feature-list {
            margin: 0;
            padding-left: 0;
            list-style: none;
            color: var(--text-primary);
        }
        .feature-list li {
            margin-bottom: 0.5rem;
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
        }
        .feature-yes { color: var(--success); font-weight: bold; flex-shrink:0; }
        .feature-no { color: var(--danger); font-weight: bold; flex-shrink:0; }
        .feature-bullet { color: var(--accent); font-weight: bold; flex-shrink:0; }
    </style>
</head>
<body data-theme="dark">

  <header class="header">
    <div class="header-content">
      <div class="logo">
        <span class="logo-icon">⚖️</span>
        <div>
          <a href="/" style="text-decoration:none; color:inherit;">
            <h1>3D Printer Prices</h1>
          </a>
          <p class="tagline">Side-by-Side Comparison</p>
        </div>
      </div>
      <div class="header-actions">
        <a href="/" class="btn btn-outline" style="text-decoration:none;">&larr; Back to Catalog</a>
      </div>
    </div>
  </header>

  <main class="compare-page-container">
    <div id="loader-wrapper" style="text-align:center; padding: 4rem;">
      <div class="loader" style="margin:0 auto;"></div>
      <p style="margin-top:1rem; color:var(--text-muted);">Fetching details from database...</p>
    </div>
    
    <div id="compare-content" style="display:none; overflow-x: auto; padding-bottom: 1rem;">
        <table class="compare-table" id="compare-table">
            <!-- Dynamically populated by compare.js -->
        </table>
    </div>
    
    <div id="empty-state" style="display:none; text-align:center; padding: 4rem;">
        <h2 style="font-size: 1.5rem; margin-bottom: 1rem;">No products selected for comparison.</h2>
        <p style="color:var(--text-muted); margin-bottom: 2rem;">Add products from the catalog to see them side-by-side.</p>
        <a href="/" class="btn btn-primary" style="text-decoration:none; display:inline-block; padding: 1rem 2rem;">Browse Printers</a>
    </div>
  </main>

  <script src="compare.js"></script>
</body>
</html>
